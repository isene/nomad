<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="OnePage">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2027"/>
      <stop offset="1" stop-color="#0c0f13"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded tile (matches the launcher icon background) -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#tile)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="107.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- One page: a single sheet with three text lines -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <rect x="178" y="138" width="156" height="236" rx="18" stroke-width="18"/>
    <line x1="214" y1="204" x2="298" y2="204" stroke-width="16"/>
    <line x1="214" y1="256" x2="298" y2="256" stroke-width="16"/>
    <line x1="214" y1="308" x2="272" y2="308" stroke-width="16"/>
  </g>
</svg>
